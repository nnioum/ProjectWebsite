<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBlock: Интерпретатор (Уровень Основа)</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">CodeBlock</div>
        <div class="actions">
            <button id="clear-btn" class="btn secondary">Очистить</button>
            <button id="run-btn" class="btn primary">▶ Запустить</button>
            <button id="stop-btn" class="btn danger" disabled>■ Остановить</button>
        </div>
    </header>

    <div class="main-container">
        
        <aside class="sidebar">
            <h3>Инструменты</h3>
            <div class="category-title">Вывод</div>
            <div class="block-template print-block" draggable="true" data-type="print">
                <button class="block-close-btn">×</button>
                <span>Print</span> 
                <input type="text" placeholder="var/num" class="mini-input">
                </div>
            <div class="category-title">Переменные</div>

            <div class="block-template variable-dec" draggable="true" data-type="assignment">
                <button class="block-close-btn">×</button>
                <span>Int</span>
                <input type="text" placeholder="name" class="mini-input">
                <span>=</span>
                <input type="text" placeholder="arithmetic expression" class = "long-input">
            </div>
            
             <div class="block-template variable-dec bool-block" draggable="true" data-type ="assignment-bool">
                <button class="block-close-btn">×</button>
                <span>Bool</span>
                <input type="text" placeholder="name" class="mini-input">
                <span>=</span>
                <input type="text" placeholder="true / false" class="long-input">
            </div>

            <div class="block-template variable-dec string-block" draggable="true" data-type="assignment-string">
                <button class="block-close-btn">×</button>
                <span>Str</span>
                <input type="text" placeholder="name" class="mini-input">
                <span>=</span>
                <input type="text" placeholder="'text'" class="long-input">
            </div>

                           
            <div class="block-template array-dec" draggable="true" data-type="array">
                <button class="block-close-btn">×</button>
                <div class="block-header">
                    <span>Arr</span>
                    <input type="text" placeholder="name" class="mini-input">
                    <span>[</span>
                    <input type ="text" placeholder="size" class="mini-input">
                    <span>]</span>
                </div>

                <div class="array-values">
                    <span>=</span>
                    <input type="text" placeholder="1,2,3..." class="long-input">
                </div>
            </div>

            <div class="category-title">Логика</div>
            <div class="block-template if-else-block" draggable="true" data-type="if-else">
                <div class="block-header">
                    <button class="block-close-btn">×</button>
                    <span>IF</span>
                    <input type="text" placeholder="logical expression" class="long-input">
                </div>
                <div class="block-body">
                    <div class="placeholder">Перетащи сюда</div>
                </div>
                <div class="else-toggle-container">
                    <button class="toggle-else">+ ELSE</button>
                </div>
                <div class="else-selection">
                    <div class="block-header if-else-header">
                        <span>ELSE</span>
                    </div>
                    <div class="block-body">
                        <div class="placeholder">Перетащи сюда</div>
                    </div>
                </div>    
            </div>

            <div class="category-title">Циклы</div> 
            <div class="block-template while-block" draggable="true" data-type="while">
            <div class="block-header">
                <button class="block-close-btn">×</button>
                <span>WHILE</span>
                <input type="text" placeholder="logical expression" class="long-input">
            </div>
            <div class="block-body">
                <div class="placeholder">Перетащи сюда</div>
            </div>
            </div>
            
            <div class="block-template for-block" draggable="true" data-type="for">
                <button class="block-close-btn">×</button>
                <div class="block-header">
                    <span>FOR</span>
                    <input type="text" placeholder="init" class="mini-input">
                    <span>;</span>
                    <input type="text" placeholder="condition" class="mini-input">
                    <span>;</span>
                    <input type="text" placeholder="update" class="mini-input">
                </div>
                <div class="block-body">
                    <div class="placeholder">Перетащи сюда</div>
                </div>
            </div>

            <div class="category-title">Функции</div>
            <div class="block-template function-block" draggable="true" data-type="functions">
                <button class="block-close-btn">×</button>
                <div class="block-header">
                    <span>FUNCTION</span>
                    <input type="text" placeholder="name function" class="mini-input">
                    <span>(</span>
                    <input type="text" placeholder="aguments" class="mini-input">
                    <span>)</span>
                </div>
                <div class="block-body">
                    <div class="placeholder">Перетащи сюда</div>
                </div>
            </div>

            <div class="block-template call-block" draggable="true" data-type="call">
                <button class="block-close-btn">×</button>
                <input type="text" placeholder="name" class="mini-input">
                <span>(</span>
                <input type="text" placeholder="agument" class="mini-input">
                <span>)</span>
            </div>

            <div class="block-template return-block" draggable="true" data-type="return">
                <button class="block-close-btn">×</button>
                <span>RETURN</span>
                <input type="text" placeholder="agument" class="mini-input">
            </div>

        </aside>

        <main class="workspace" id="workspace">
            <div class="start-message">Перетащите блоки сюда, чтобы начать...</div>
            </main>

        <aside class="console-panel">
            <h3>Вывод</h3>
            <div id="console-output" class="output-box">
                <span class="system-msg">Ожидание запуска...</span>
            </div>
        </aside>

    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
